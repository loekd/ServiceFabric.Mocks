name: Build and Test (CI)

on:
  pull_request:
    branches: ["master"]
  workflow_dispatch:

permissions:
  checks: write
  contents: read
  
jobs:
  build:
    name: CI Build

    strategy:
      matrix:
        configuration: [Release]

    runs-on: windows-latest

    env:
      Solution_Name: ServiceFabric.Mocks.sln
      Test_Project_File: \test\ServiceFabric.Mocks.NetCoreTests\ServiceFabric.Mocks.NetCoreTests.csproj
      Test_Project_Path: \test\ServiceFabric.Mocks.NetCoreTests
      Wap_Project_Path: \src\ServiceFabric.Mocks\ServiceFabric.Mocks.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # create version
      - name: Bump version and push tag (what-if)
        id: tag_version
        uses: loekd/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true

      # Install the .NET Core workload
      - name: Install .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      # Install SF SDK
      - name: Install SF
        shell: pwsh
        run: |
          Set-ExecutionPolicy -ExecutionPolicy Unrestricted -Force -Scope CurrentUser   
          $ProgressPreference = 'SilentlyContinue'
          $keyPath = "HKLM:\SOFTWARE\Microsoft\Service Fabric SDK"
          if (Test-Path $keyPath) {
            Remove-Item -Path $keyPath -Force
            Write-Output "Registry key removed: $keyPath"
          } else {
            Write-Output "Registry key not found: $keyPath"
          }
          # see https://learn.microsoft.com/en-us/azure/service-fabric/service-fabric-get-started
          [xml]$packageProps = Get-Content "./Directory.Packages.props"
          $packageVersion = ($packageProps.Project.ItemGroup.PackageVersion | Where-Object { $_.Include -eq "Microsoft.ServiceFabric.Actors" } | Select-Object -First 1).Version
          $packageMinorVersion = ([version]$packageVersion).Minor
          $pageContent = Invoke-RestMethod -Method GET -Uri https://learn.microsoft.com/en-us/azure/service-fabric/service-fabric-get-started
          $sdkDownloadUrl = [regex]::Match($pageContent, "https://download\.microsoft\.com/download/[a-zA-Z0-9/\.\-]*MicrosoftServiceFabric\.11\.$packageMinorVersion\.[0-9]+\.[0-9]+\.exe").Value
          if (!$sdkDownloadUrl) {
            throw "Could not find a matching Service Fabric SDK download URL for Microsoft.ServiceFabric.Actors version $packageVersion."
          }
          Invoke-RestMethod -Method GET -Uri $sdkDownloadUrl -OutFile setup.exe
          # .\setup.exe  /accepteula /force /quiet
          Start-Process setup.exe -UseNewEnvironment -ArgumentList '/accepteula /force /quiet' -Wait
     

      # Run dotnet build
      - name: Run build
        run: dotnet build --configuration DEBUG

      # Execute all unit tests in the solution
      - name: Execute unit tests
        run: dotnet test --logger "trx;LogFileName=results.trx" ${Test_Project_File}
